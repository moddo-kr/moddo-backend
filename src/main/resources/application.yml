spring:
  application:
    name: moddo
  config:
    import: classpath:config/application-jwt.yml, classpath:config/application-s3.yml
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        default_batch_fetch_size: 30
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul
    show-sql: true
  data:
    redis:
      timeout: 300ms
      connect-timeout: 300ms
server:
  address: 0.0.0.0
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

kakao:
  token-request-uri: https://kauth.kakao.com/oauth/token
  profile-request-uri: https://kapi.kakao.com/v2/user/me
  logout-request-uri: https://kapi.kakao.com/v1/user/logout
  unlink-request-uri: https://kapi.kakao.com/v1/user/unlink

cookie:
  secure: true
  http-only: true
  path: /
  same-site: none
  max-age: 7D

frontend:
  cors-allowed-origins:
    - https://www.moddo.kr
    - http://localhost:3000
    - http://localhost:4173
  redirect-allowed-origins:
    - http://localhost:3000
    - https://moddo-frontend.pages.dev
    - https://www.moddo.kr
    - https://moddo.kr
  default-local-redirect-url: http://localhost:3000
  default-prod-redirect-url: https://www.moddo.kr

---

spring:
  config:
    import: classpath:config/application-dev.yml
    activate:
      on-profile: dev

---

spring:
  config:
    import: classpath:config/application-prod.yml
    activate:
      on-profile: prod

---




